client:
  name: "client-c"
  environment: "dev"
  cloudProvider: "gcp"

image:
  repository: "europe-west1-docker.pkg.dev/epd-project/epd-client-c/platform-app"
  tag: "latest"

replicaCount: 1

ingress:
  hosts:
    - host: "platform.client-c.example.com"
      paths:
        - path: /
          pathType: Prefix

# GCP Workload Identity annotation
serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: "epd-client-c@epd-project.iam.gserviceaccount.com"

autoscaling:
  minReplicas: 1
  maxReplicas: 4

env:
  - name: LOG_LEVEL
    value: "debug"
  - name: PORT
    value: "8080"
  - name: CLIENT_ID
    value: "client-c"
