apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform-app.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform-app.labels" . | nindent 4 }}
data:
  CLIENT_NAME: {{ .Values.client.name | quote }}
  ENVIRONMENT: {{ .Values.client.environment | quote }}
  CLOUD_PROVIDER: {{ .Values.client.cloudProvider | quote }}
